<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="hood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b4a63"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f472b6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <!-- brand chip -->
  <rect x="0" y="0" width="64" height="64" rx="15" fill="url(#bg)"/>

  <!-- head -->
  <circle cx="32" cy="35" r="25" fill="url(#hood)"/>

  <!-- headband + tail -->
  <path d="M52,24 q9,-1 15,5 q-8,2 -15,4 z" fill="#ec4899"/>
  <rect x="6" y="21" width="51" height="10" rx="5" fill="url(#band)" transform="rotate(-6 32 26)"/>

  <!-- eyes -->
  <ellipse cx="24" cy="39" rx="6.4" ry="8" fill="#ffffff"/>
  <ellipse cx="40" cy="39" rx="6.4" ry="8" fill="#ffffff"/>
  <circle cx="25.5" cy="41" r="3.1" fill="#0f172a"/>
  <circle cx="41.5" cy="41" r="3.1" fill="#0f172a"/>
  <circle cx="26.8" cy="39.6" r="1.1" fill="#ffffff"/>
  <circle cx="42.8" cy="39.6" r="1.1" fill="#ffffff"/>
</svg>
