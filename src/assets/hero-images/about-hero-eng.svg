<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#160d33"/><stop offset="0.5" stop-color="#2a1259"/><stop offset="1" stop-color="#431967"/>
    </linearGradient>
    <radialGradient id="glowMag" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#d946ef" stop-opacity="0.45"/><stop offset="1" stop-color="#d946ef" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTeal" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.35"/><stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="floor" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.4"/><stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b4a63"/><stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f472b6"/><stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e2e8f0"/><stop offset="1" stop-color="#94a3b8"/>
    </linearGradient>
    <pattern id="dots" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="2" fill="#ffffff" opacity="0.05"/>
    </pattern>
    <pattern id="keys" width="20" height="15" patternUnits="userSpaceOnUse">
      <rect x="2" y="2" width="15" height="10" rx="2" fill="#334155"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <ellipse cx="1010" cy="110" rx="520" ry="420" fill="url(#glowMag)"/>
  <ellipse cx="160" cy="540" rx="460" ry="360" fill="url(#glowTeal)"/>
  <ellipse cx="600" cy="640" rx="640" ry="220" fill="url(#floor)"/>

  <g fill="#ffffff" opacity="0.05" font-family="DejaVu Sans Mono, monospace" font-weight="bold">
    <text x="60" y="170" font-size="120" transform="rotate(-10 60 170)">{</text>
    <text x="1090" y="560" font-size="120">}</text>
  </g>

  <!-- ===== TYPE no evil (cx=300): hands up off the keyboard ===== -->
  <g>
    <ellipse cx="300" cy="478" rx="104" ry="18" fill="#000000" opacity="0.22"/>
    <rect x="246" y="320" width="108" height="156" rx="48" fill="url(#hood)"/>
    <!-- head -->
    <circle cx="300" cy="282" r="76" fill="url(#hood)"/>
    <rect x="222" y="234" width="156" height="20" rx="10" fill="url(#band)" transform="rotate(-6 300 244)"/>
    <circle cx="370" cy="240" r="8" fill="#ec4899"/>
    <path d="M375,238 q40,-4 68,16 q-34,2 -66,8 z" fill="#f472b6"/>
    <!-- innocent up-glance eyes -->
    <ellipse cx="278" cy="280" rx="14" ry="17" fill="#ffffff"/>
    <ellipse cx="322" cy="280" rx="14" ry="17" fill="#ffffff"/>
    <circle cx="280" cy="274" r="6.5" fill="#0f172a"/>
    <circle cx="324" cy="274" r="6.5" fill="#0f172a"/>
    <circle cx="282" cy="270" r="2.2" fill="#ffffff"/>
    <circle cx="326" cy="270" r="2.2" fill="#ffffff"/>
    <!-- hands thrown up, off the keys -->
    <path d="M258,372 L282,388" stroke="#273449" stroke-width="34" stroke-linecap="round"/>
    <path d="M342,372 L318,388" stroke="#273449" stroke-width="34" stroke-linecap="round"/>
    <circle cx="282" cy="386" r="18" fill="#334155"/>
    <circle cx="318" cy="386" r="18" fill="#334155"/>
    <path d="M275,378 v9 M282,376 v11 M289,378 v9" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M311,378 v9 M318,376 v11 M325,378 v9" stroke="#1e293b" stroke-width="2.5" stroke-linecap="round"/>
    <!-- keyboard -->
    <rect x="218" y="430" width="164" height="46" rx="9" fill="#0b1120" stroke="#334155" stroke-width="1.5"/>
    <rect x="228" y="437" width="144" height="32" fill="url(#keys)"/>
    <rect x="228" y="437" width="144" height="32" fill="#34d399" opacity="0.0"/>
    <rect x="316" y="439" width="50" height="10" rx="2" fill="#34d399" opacity="0.85"/>
  </g>

  <!-- ===== MERGE no evil (cx=600): crossed-arm X + blocked git merge ===== -->
  <g>
    <ellipse cx="600" cy="478" rx="104" ry="18" fill="#000000" opacity="0.22"/>
    <rect x="546" y="320" width="108" height="156" rx="48" fill="url(#hood)"/>
    <circle cx="600" cy="282" r="76" fill="url(#hood)"/>
    <rect x="522" y="234" width="156" height="20" rx="10" fill="url(#band)" transform="rotate(-6 600 244)"/>
    <circle cx="670" cy="240" r="8" fill="#ec4899"/>
    <path d="M675,238 q40,-4 68,16 q-34,2 -66,8 z" fill="#f472b6"/>
    <!-- side-eye -->
    <ellipse cx="578" cy="282" rx="14" ry="17" fill="#ffffff"/>
    <ellipse cx="622" cy="282" rx="14" ry="17" fill="#ffffff"/>
    <circle cx="585" cy="284" r="6.5" fill="#0f172a"/>
    <circle cx="629" cy="284" r="6.5" fill="#0f172a"/>
    <circle cx="587" cy="280" r="2.2" fill="#ffffff"/>
    <circle cx="631" cy="280" r="2.2" fill="#ffffff"/>
    <!-- crossed-arm X (nope) -->
    <path d="M556,372 Q600,404 644,440" fill="none" stroke="#273449" stroke-width="34" stroke-linecap="round"/>
    <path d="M644,372 Q600,404 556,440" fill="none" stroke="#273449" stroke-width="34" stroke-linecap="round"/>
    <circle cx="556" cy="440" r="18" fill="#334155"/>
    <circle cx="644" cy="440" r="18" fill="#334155"/>
    <!-- blocked git-merge glyph (upper right) -->
    <g transform="translate(22 -6)">
      <line x1="700" y1="206" x2="700" y2="250" stroke="#34d399" stroke-width="5" stroke-linecap="round"/>
      <circle cx="700" cy="250" r="6" fill="#34d399"/>
      <circle cx="676" cy="250" r="6" fill="#fbbf24"/>
      <path d="M676,250 C676,224 700,232 700,210" fill="none" stroke="#fbbf24" stroke-width="5"/>
      <circle cx="700" cy="208" r="6" fill="#f472b6"/>
      <circle cx="700" cy="208" r="13" fill="none" stroke="#ef4444" stroke-width="3"/>
      <line x1="691" y1="217" x2="709" y2="199" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ===== SHIP no evil (cx=900): holding the rocket down ===== -->
  <g>
    <ellipse cx="900" cy="478" rx="104" ry="18" fill="#000000" opacity="0.22"/>
    <rect x="846" y="320" width="108" height="156" rx="48" fill="url(#hood)"/>
    <circle cx="900" cy="282" r="76" fill="url(#hood)"/>
    <rect x="822" y="234" width="156" height="20" rx="10" fill="url(#band)" transform="rotate(-6 900 244)"/>
    <circle cx="970" cy="240" r="8" fill="#ec4899"/>
    <path d="M975,238 q40,-4 68,16 q-34,2 -66,8 z" fill="#f472b6"/>
    <!-- alarmed wide eyes -->
    <ellipse cx="878" cy="280" rx="16" ry="20" fill="#ffffff"/>
    <ellipse cx="922" cy="280" rx="16" ry="20" fill="#ffffff"/>
    <circle cx="878" cy="282" r="6.5" fill="#0f172a"/>
    <circle cx="922" cy="282" r="6.5" fill="#0f172a"/>
    <circle cx="880" cy="277" r="2.4" fill="#ffffff"/>
    <circle cx="924" cy="277" r="2.4" fill="#ffffff"/>
    <!-- sweat drop -->
    <path d="M946,266 C951,274 951,280 946,283 C941,280 941,274 946,266 Z" fill="#67e8f9"/>
    <!-- rocket (grounded, being held) -->
    <path d="M900,372 L878,410 L922,410 Z" fill="#f472b6"/>
    <rect x="878" y="408" width="44" height="64" rx="12" fill="url(#steel)"/>
    <circle cx="900" cy="432" r="9" fill="#67e8f9" stroke="#0ea5e9" stroke-width="2"/>
    <path d="M878,452 L860,486 L878,474 Z" fill="#ec4899"/>
    <path d="M922,452 L940,486 L922,474 Z" fill="#ec4899"/>
    <!-- hands gripping the rocket -->
    <path d="M858,360 Q852,418 874,442" fill="none" stroke="#273449" stroke-width="34" stroke-linecap="round"/>
    <path d="M942,360 Q948,418 926,442" fill="none" stroke="#273449" stroke-width="34" stroke-linecap="round"/>
    <circle cx="874" cy="442" r="18" fill="#334155"/>
    <circle cx="926" cy="442" r="18" fill="#334155"/>
  </g>

  <!-- caption -->
  <text x="600" y="556" text-anchor="middle" font-family="DejaVu Sans Mono, monospace" font-size="26" fill="#94a3b8">type no evil · merge no evil · ship no evil</text>

  <g fill="#fde68a">
    <path d="M150,250 C151.4,256 153,257.6 159,259 C153,260.4 151.4,262 150,268 C148.6,262 147,260.4 141,259 C147,257.6 148.6,256 150,250 Z"/>
    <path d="M1058,300 C1059.4,306 1061,307.6 1067,309 C1061,310.4 1059.4,312 1058,318 C1056.6,312 1055,310.4 1049,309 C1055,307.6 1056.6,306 1058,300 Z" fill="#67e8f9"/>
  </g>
</svg>
