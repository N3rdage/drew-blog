<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#160d33"/>
      <stop offset="0.5" stop-color="#2a1259"/>
      <stop offset="1" stop-color="#431967"/>
    </linearGradient>
    <radialGradient id="glowMag" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#d946ef" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#d946ef" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTeal" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="floor" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#334155"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="cloneHood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f472b6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="term" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111a2e"/>
      <stop offset="1" stop-color="#0b1120"/>
    </linearGradient>
    <pattern id="dots" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="2" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <ellipse cx="1010" cy="120" rx="520" ry="420" fill="url(#glowMag)"/>
  <ellipse cx="120" cy="560" rx="460" ry="380" fill="url(#glowTeal)"/>
  <ellipse cx="600" cy="660" rx="620" ry="240" fill="url(#floor)"/>

  <!-- faint background glyphs -->
  <g fill="#ffffff" opacity="0.05" font-family="DejaVu Sans Mono, monospace" font-weight="bold">
    <text x="60" y="210" font-size="150" transform="rotate(-10 60 210)">{</text>
    <text x="1070" y="600" font-size="150" transform="rotate(8 1070 600)">}</text>
    <text x="1130" y="330" font-size="90">#</text>
  </g>

  <!-- terminal -->
  <g>
    <rect x="566" y="209" width="584" height="300" rx="20" fill="#000000" opacity="0.30"/>
    <rect x="560" y="200" width="584" height="300" rx="20" fill="url(#term)" stroke="#334155" stroke-width="1.5"/>
    <path d="M560,220 a20,20 0 0 1 20,-20 h544 a20,20 0 0 1 20,20 v26 h-584 z" fill="#1c2740"/>
    <circle cx="588" cy="227" r="7" fill="#ff5f56"/>
    <circle cx="612" cy="227" r="7" fill="#ffbd2e"/>
    <circle cx="636" cy="227" r="7" fill="#27c93f"/>
    <text x="664" y="233" font-family="DejaVu Sans Mono, monospace" font-size="16" fill="#94a3b8">the-library — claude code</text>
    <g font-family="DejaVu Sans Mono, monospace" font-size="21">
      <text x="584" y="300"><tspan fill="#34d399">~/the-library $ </tspan><tspan fill="#e2e8f0">claude</tspan></text>
      <text x="584" y="342" fill="#fbbf24">» agent: ready to edit 4 files</text>
      <text x="584" y="384" fill="#f472b6" font-weight="bold">» whoa — let's chat first!</text>
      <text x="584" y="426" fill="#64748b" font-style="italic"># the "one more thing" trap, dodged</text>
      <text x="584" y="470"><tspan fill="#34d399">~/the-library $ </tspan></text>
      <rect x="786" y="452" width="12" height="24" fill="#34d399"/>
    </g>
  </g>

  <!-- eager apprentice clone, lunging toward the keyboard -->
  <g transform="translate(486 444) rotate(7)" opacity="0.95">
    <!-- motion lines -->
    <path d="M-70,-30 q-16,4 -28,0 M-72,-8 q-18,2 -30,-2 M-66,14 q-16,4 -28,2" stroke="#c084fc" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.8"/>
    <!-- body -->
    <rect x="-34" y="0" width="68" height="58" rx="22" fill="url(#cloneHood)"/>
    <!-- reaching arms -->
    <path d="M22,16 q34,-4 56,-18 M18,30 q34,6 58,2" stroke="#6d28d9" stroke-width="16" stroke-linecap="round" fill="none"/>
    <circle cx="80" cy="-4" r="11" fill="#7c3aed"/>
    <circle cx="78" cy="34" r="11" fill="#7c3aed"/>
    <!-- head -->
    <circle cx="2" cy="-22" r="38" fill="url(#cloneHood)"/>
    <rect x="-40" y="-40" width="84" height="11" rx="5" fill="#c084fc" transform="rotate(-6 2 -34)"/>
    <!-- eager eyes looking right -->
    <ellipse cx="-10" cy="-20" rx="9" ry="12" fill="#ffffff"/>
    <ellipse cx="16" cy="-20" rx="9" ry="12" fill="#ffffff"/>
    <circle cx="-6" cy="-18" r="5" fill="#1e1b4b"/>
    <circle cx="20" cy="-18" r="5" fill="#1e1b4b"/>
    <circle cx="-4" cy="-21" r="1.6" fill="#ffffff"/>
    <circle cx="22" cy="-21" r="1.6" fill="#ffffff"/>
  </g>

  <!-- chat bubble from the apprentice -->
  <g>
    <rect x="404" y="296" width="150" height="44" rx="12" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
    <path d="M470,338 l8,22 l16,-22 z" fill="#1e293b"/>
    <text x="479" y="324" font-family="DejaVu Sans Mono, monospace" font-size="16" fill="#e2e8f0" text-anchor="middle">+1 more thing!</text>
  </g>

  <!-- main ninja: calm, firm "hold up" -->
  <g>
    <ellipse cx="250" cy="540" rx="146" ry="24" fill="#000000" opacity="0.25"/>
    <rect x="150" y="402" width="200" height="160" rx="62" fill="url(#hood)"/>
    <!-- halt arm + open palm -->
    <path d="M318,452 q66,-30 96,-86" fill="none" stroke="#273449" stroke-width="42" stroke-linecap="round"/>
    <g transform="rotate(-10 432 350)">
      <rect x="414" y="326" width="40" height="52" rx="14" fill="#334155"/>
      <rect x="408" y="344" width="14" height="20" rx="7" fill="#334155"/>
      <path d="M422,332 v18 M432,330 v20 M442,332 v18" stroke="#1e293b" stroke-width="3" stroke-linecap="round"/>
    </g>
    <!-- head -->
    <circle cx="250" cy="326" r="98" fill="url(#hood)"/>
    <!-- headband -->
    <rect x="146" y="276" width="210" height="27" rx="13" fill="url(#band)" transform="rotate(-6 250 289)"/>
    <circle cx="352" cy="282" r="12" fill="#ec4899"/>
    <path d="M358,280 q58,-6 100,20 q-50,2 -96,12 z" fill="#f472b6"/>
    <!-- calm, half-lidded eyes -->
    <ellipse cx="214" cy="330" rx="25" ry="29" fill="#ffffff"/>
    <ellipse cx="290" cy="330" rx="25" ry="29" fill="#ffffff"/>
    <circle cx="222" cy="338" r="12" fill="#0f172a"/>
    <circle cx="298" cy="338" r="12" fill="#0f172a"/>
    <circle cx="227" cy="333" r="4" fill="#ffffff"/>
    <circle cx="303" cy="333" r="4" fill="#ffffff"/>
    <!-- eyelids (gives the unimpressed look) -->
    <path d="M188,322 a25,22 0 0 1 51,0 z" fill="url(#hood)"/>
    <path d="M264,322 a25,22 0 0 1 51,0 z" fill="url(#hood)"/>
    <!-- flat mouth + cheeks -->
    <path d="M236,372 q14,6 28,0" fill="none" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
    <ellipse cx="190" cy="360" rx="14" ry="9" fill="#f472b6" opacity="0.4"/>
    <ellipse cx="312" cy="360" rx="14" ry="9" fill="#f472b6" opacity="0.4"/>
  </g>

  <!-- accent sparkles -->
  <g fill="#fde68a">
    <path d="M690,150 C691.4,156 693,157.6 699,159 C693,160.4 691.4,162 690,168 C688.6,162 687,160.4 681,159 C687,157.6 688.6,156 690,150 Z"/>
    <path d="M1095,470 C1096.4,476 1098,477.6 1104,479 C1098,480.4 1096.4,482 1095,488 C1093.6,482 1092,480.4 1086,479 C1092,477.6 1093.6,476 1095,470 Z" fill="#67e8f9"/>
  </g>
</svg>
