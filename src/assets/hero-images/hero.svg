<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#160d33"/>
      <stop offset="0.5" stop-color="#2a1259"/>
      <stop offset="1" stop-color="#431967"/>
    </linearGradient>
    <radialGradient id="glowMag" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#d946ef" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#d946ef" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowTeal" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#2dd4bf" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="floor" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="hood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#334155"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#f472b6"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e2e8f0"/>
      <stop offset="1" stop-color="#94a3b8"/>
    </linearGradient>
    <linearGradient id="term" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#111a2e"/>
      <stop offset="1" stop-color="#0b1120"/>
    </linearGradient>
    <pattern id="dots" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="3" cy="3" r="2" fill="#ffffff" opacity="0.05"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <ellipse cx="1010" cy="120" rx="520" ry="420" fill="url(#glowMag)"/>
  <ellipse cx="120" cy="560" rx="460" ry="380" fill="url(#glowTeal)"/>
  <ellipse cx="600" cy="660" rx="620" ry="240" fill="url(#floor)"/>

  <!-- faint background glyphs -->
  <g fill="#ffffff" opacity="0.05" font-family="DejaVu Sans Mono, monospace" font-weight="bold">
    <text x="60" y="210" font-size="150" transform="rotate(-10 60 210)">{</text>
    <text x="1070" y="600" font-size="150" transform="rotate(8 1070 600)">}</text>
    <text x="930" y="140" font-size="74">&lt;/&gt;</text>
    <text x="80" y="540" font-size="130">;</text>
    <text x="1120" y="330" font-size="90">#</text>
    <text x="520" y="600" font-size="90" opacity="0.8">*</text>
  </g>

  <!-- shuriken -->
  <g transform="translate(470 150) rotate(18)">
    <path d="M0,-40 L10,-10 L40,0 L10,10 L0,40 L-10,10 L-40,0 L-10,-10 Z" fill="url(#steel)" stroke="#64748b" stroke-width="2"/>
    <circle cx="0" cy="0" r="7" fill="#0b1120"/>
  </g>

  <!-- ninja -->
  <g>
    <!-- grounding shadow -->
    <ellipse cx="305" cy="545" rx="150" ry="26" fill="#000000" opacity="0.25"/>
    <!-- body -->
    <rect x="200" y="395" width="210" height="170" rx="64" fill="url(#hood)"/>
    <!-- back arm holding a tiny star -->
    <path d="M372,470 q70,10 96,-22" fill="none" stroke="#1e293b" stroke-width="40" stroke-linecap="round"/>
    <g transform="translate(478 432) rotate(-10) scale(0.42)">
      <path d="M0,-40 L10,-10 L40,0 L10,10 L0,40 L-10,10 L-40,0 L-10,-10 Z" fill="url(#steel)" stroke="#64748b" stroke-width="3"/>
      <circle cx="0" cy="0" r="8" fill="#0b1120"/>
    </g>
    <!-- head -->
    <circle cx="305" cy="312" r="120" fill="url(#hood)"/>
    <!-- headband -->
    <rect x="178" y="252" width="258" height="30" rx="15" fill="url(#band)" transform="rotate(-6 305 267)"/>
    <!-- headband knot + tails -->
    <circle cx="418" cy="258" r="13" fill="#ec4899"/>
    <path d="M424,256 q70,-8 120,26 q-60,2 -116,16 z" fill="#f472b6"/>
    <path d="M422,268 q66,18 104,64 q-58,-16 -110,-40 z" fill="#ec4899"/>
    <!-- eyes -->
    <g>
      <ellipse cx="266" cy="318" rx="26" ry="32" fill="#ffffff"/>
      <ellipse cx="344" cy="318" rx="26" ry="32" fill="#ffffff"/>
      <circle cx="272" cy="324" r="13" fill="#0f172a"/>
      <circle cx="350" cy="324" r="13" fill="#0f172a"/>
      <circle cx="277" cy="319" r="4.5" fill="#ffffff"/>
      <circle cx="355" cy="319" r="4.5" fill="#ffffff"/>
    </g>
    <!-- cheeks -->
    <ellipse cx="236" cy="356" rx="16" ry="10" fill="#f472b6" opacity="0.45"/>
    <ellipse cx="374" cy="356" rx="16" ry="10" fill="#f472b6" opacity="0.45"/>
    <!-- waving arm + hand (front) -->
    <path d="M232,430 q-48,-70 -64,-150" fill="none" stroke="#273449" stroke-width="44" stroke-linecap="round"/>
    <circle cx="162" cy="262" r="34" fill="#334155"/>
    <!-- motion arcs -->
    <path d="M120,236 q-14,-6 -22,-20" fill="none" stroke="#fbbf24" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
    <path d="M132,212 q-10,-10 -14,-26" fill="none" stroke="#fbbf24" stroke-width="6" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- terminal -->
  <g>
    <rect x="506" y="214" width="648" height="292" rx="20" fill="#000000" opacity="0.30"/>
    <rect x="500" y="205" width="648" height="292" rx="20" fill="url(#term)" stroke="#334155" stroke-width="1.5"/>
    <!-- title bar -->
    <path d="M500,225 a20,20 0 0 1 20,-20 h608 a20,20 0 0 1 20,20 v26 h-648 z" fill="#1c2740"/>
    <circle cx="528" cy="232" r="7" fill="#ff5f56"/>
    <circle cx="552" cy="232" r="7" fill="#ffbd2e"/>
    <circle cx="576" cy="232" r="7" fill="#27c93f"/>
    <text x="604" y="238" font-family="DejaVu Sans Mono, monospace" font-size="16" fill="#94a3b8">silly.ninja — zsh</text>
    <!-- content -->
    <g font-family="DejaVu Sans Mono, monospace" font-size="22">
      <text x="524" y="308"><tspan fill="#34d399">~/silly.ninja $ </tspan><tspan fill="#e2e8f0">echo "hello, world"</tspan></text>
      <text x="524" y="350" fill="#fbbf24" font-weight="bold">hello, world</text>
      <text x="524" y="392" fill="#64748b" font-style="italic"># a work in progress — but isn't everything</text>
      <text x="524" y="446"><tspan fill="#34d399">~/silly.ninja $ </tspan></text>
      <rect x="735" y="427" width="13" height="25" fill="#34d399"/>
    </g>
  </g>

  <!-- foreground accent glyphs + sparkles -->
  <g font-family="DejaVu Sans Mono, monospace" font-weight="bold">
    <text x="430" y="470" font-size="30" fill="#fbbf24" opacity="0.95" transform="rotate(-8 430 470)">{ }</text>
    <text x="150" y="170" font-size="34" fill="#34d399" opacity="0.95">;</text>
    <text x="455" y="560" font-size="28" fill="#a78bfa" opacity="0.9">&lt;/&gt;</text>
  </g>
  <g fill="#fde68a">
    <path d="M620,150 C621.4,156 623,157.6 629,159 C623,160.4 621.4,162 620,168 C618.6,162 617,160.4 611,159 C617,157.6 618.6,156 620,150 Z"/>
    <path d="M408,232 C409.2,237 410.8,238.8 416,240 C410.8,241.2 409.2,243 408,248 C406.8,243 405.2,241.2 400,240 C405.2,238.8 406.8,237 408,232 Z" fill="#ffffff"/>
    <path d="M1075,470 C1076.4,476 1078,477.6 1084,479 C1078,480.4 1076.4,482 1075,488 C1073.6,482 1072,480.4 1066,479 C1072,477.6 1073.6,476 1075,470 Z" fill="#67e8f9"/>
  </g>
</svg>
